<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome — Royal Dental Care</title>
<style>
  /* ───────────────────────────────────────────────────────────
     BRANDING — pulled from Royal Dental Care's Branding Book 2025.
     Burnt orange (Santa Fe) background, beige/cream text, charcoal
     accents. Swap public/logo-light.png / logo-r-light.png if you
     send over an exact design later.
     ─────────────────────────────────────────────────────────── */
  :root {
    --bg-1: #c17f5f;         /* background gradient, top (lighter Santa Fe) */
    --bg-2: #8f5640;         /* background gradient, bottom (deeper Santa Fe) */
    --ink: #f3ead9;          /* primary text — warm beige/cream */
    --ink-soft: #e2c9ae;     /* secondary text — muted beige */
    --accent: #2b2622;       /* charcoal/black — rule, tagline accents */
    --font-display: "Playfair Display", "Iowan Old Style", Georgia, serif;
    --font-label: "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(120% 90% at 50% 30%, var(--bg-1), var(--bg-2));
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-label);
    color: var(--ink);
  }

  /* giant translucent "R" watermark, echoing Royal's own brand pattern */
  .watermark {
    position: fixed;
    right: -4vw;
    bottom: -8vh;
    height: 78vh;
    opacity: 0.14;
    pointer-events: none;
  }

  .stage {
    position: relative;
    text-align: center;
    padding: 0 6vw;
  }

  .logo {
    height: clamp(28px, 4vw, 46px);
    margin: 0 0 40px;
    opacity: 0;
  }

  .eyebrow {
    font-size: clamp(13px, 1.4vw, 18px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 28px;
    opacity: 0;
  }

  .name {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(48px, 8vw, 118px);
    line-height: 1.05;
    margin: 0;
    letter-spacing: 0.02em;
    opacity: 0;
    color: var(--ink);
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 34px auto;
    opacity: 0;
    transform: scaleX(0);
  }

  .tagline {
    font-size: clamp(13px, 1.3vw, 17px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0;
    opacity: 0;
  }

  /* entrance choreography */
  .stage.in .logo { animation: rise 0.9s ease forwards 0s; }
  .stage.in .eyebrow { animation: rise 0.9s ease forwards 0.25s; }
  .stage.in .name { animation: rise 0.9s ease forwards 0.5s; }
  .stage.in .rule { animation: rule-in 0.7s ease forwards 1.05s; }
  .stage.in .tagline { animation: rise 0.9s ease forwards 1.25s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rule-in {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }

  /* tap-to-fullscreen hint, only shown until the screen goes fullscreen */
  #fsHint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.5;
    transition: opacity 0.4s ease;
  }
  #fsHint.hidden { opacity: 0; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    .stage.in .logo, .stage.in .eyebrow, .stage.in .name, .stage.in .rule, .stage.in .tagline {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <img class="watermark" src="/logo-r-light.png" alt="" />
  <div class="stage" id="stage">
    <img class="logo" src="/logo-light.png" alt="Royal Dental Care" />
    <p class="eyebrow" id="eyebrow">Welcome</p>
    <h1 class="name" id="name">—</h1>
    <div class="rule"></div>
    <p class="tagline" id="tagline">To your personal suite</p>
  </div>
  <div id="fsHint">Tap anywhere for fullscreen</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var room = params.get('room') || 'RDC1-1';

    var stage = document.getElementById('stage');
    var eyebrowEl = document.getElementById('eyebrow');
    var nameEl = document.getElementById('name');
    var taglineEl = document.getElementById('tagline');
    var fsHint = document.getElementById('fsHint');

    var IDLE_EYEBROW = 'Welcome to';
    var IDLE_NAME = 'Royal Dental Care';
    var IDLE_TAGLINE = "We're getting your suite ready";

    function play(eyebrow, name, tagline) {
      stage.classList.remove('in');
      void stage.offsetWidth; // restart animation even if content is unchanged
      eyebrowEl.textContent = eyebrow;
      nameEl.textContent = name;
      taglineEl.textContent = tagline;
      stage.classList.add('in');
    }

    function render(entry) {
      if (entry && entry.name) {
        play('Welcome', entry.name, 'To your personal suite');
      } else {
        play(IDLE_EYEBROW, IDLE_NAME, IDLE_TAGLINE);
      }
    }

    var socket = io();
    socket.on('connect', function () { socket.emit('display:join', room); });
    socket.on('display:update', render);

    // ── Fullscreen handling ──────────────────────────────────────
    // Browsers block auto-fullscreen without a user gesture, so we
    // try immediately (works in some kiosk browsers), then fall back
    // to fullscreening on the first tap/click anywhere on screen.
    function enterFullscreen() {
      var el = document.documentElement;
      var request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (request) {
        request.call(el).then(function () {
          fsHint.classList.add('hidden');
        }).catch(function () { /* blocked until a real user gesture happens */ });
      }
    }

    document.addEventListener('click', function () {
      enterFullscreen();
    });
    document.addEventListener('fullscreenchange', function () {
      if (document.fullscreenElement) fsHint.classList.add('hidden');
    });
    window.addEventListener('load', enterFullscreen);
  </script>
</body>
</html>
