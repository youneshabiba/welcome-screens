<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome — Royal Dental Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!--
  Playfair Display = Latin name text (elegant italic serif)
  Amiri            = Arabic serif fallback — same "serif" feeling for
                      Arabic patient names. Browsers auto-pick whichever
                      font in the stack has glyphs for each character,
                      so Latin names use Playfair and Arabic names use
                      Amiri automatically, no extra logic needed.
  Montserrat       = clean geometric sans for small labels, closest
                      widely-available match to the logo's wordmark style
-->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f3ead9;          /* primary text — warm beige/cream */
    --ink-soft: #e2c9ae;     /* secondary text — muted beige */
    --accent: #2b2622;       /* charcoal/black — rule, tagline accents */
    --font-display: "Playfair Display", "Amiri", Georgia, serif;
    --font-label: "Montserrat", "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }
  body {
    position: relative;
    font-family: var(--font-label);
    color: var(--ink);
    background-image: url('/bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /*
    The background image's logo band was removed (inpainted) so this text
    block sits in that same space instead of overlapping it.
  */
  .stage {
    position: absolute;
    left: 13%;
    top: 30%;
    max-width: 62%;
    text-align: left;
  }

  .eyebrow {
    font-family: var(--font-label);
    font-size: clamp(16px, 1.7vw, 40px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 3.5vh;
    opacity: 0;
  }

  .name {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(60px, 7.8vw, 170px);
    line-height: 1.1;
    margin: 0 0 4.5vh;
    letter-spacing: 0.01em;
    opacity: 0;
    color: var(--ink);
  }

  .idle-logo {
    display: block;
    height: clamp(70px, 16vh, 220px);
    width: auto;
    margin: 0 0 4.5vh;
    opacity: 0;
  }

  .rule {
    width: 130px;
    height: 3px;
    background: var(--accent);
    margin: 0 0 3.2vh;
    opacity: 0;
    transform-origin: left center;
    transform: scaleX(0);
  }

  .tagline {
    font-family: var(--font-label);
    font-size: clamp(16px, 1.7vw, 40px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0;
    opacity: 0;
  }

  /* entrance choreography */
  .stage.in .eyebrow { animation: rise 0.9s ease forwards 0.1s; }
  .stage.in .name, .stage.in .idle-logo { animation: rise 0.9s ease forwards 0.35s; }
  .stage.in .rule { animation: rule-in 0.7s ease forwards 0.9s; }
  .stage.in .tagline { animation: rise 0.9s ease forwards 1.1s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rule-in {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }

  /* tap-to-fullscreen hint, only shown until the screen goes fullscreen */
  #fsHint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.5;
    transition: opacity 0.4s ease;
  }
  #fsHint.hidden { opacity: 0; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    .stage.in .eyebrow, .stage.in .name, .stage.in .idle-logo, .stage.in .rule, .stage.in .tagline {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <p class="eyebrow" id="eyebrow">Welcome</p>
    <h1 class="name" id="name" style="display:none;">—</h1>
    <img class="idle-logo" id="idleLogo" src="/logo-light.png" alt="Royal Dental Care" style="display:none;" />
    <div class="rule"></div>
    <p class="tagline" id="tagline">To your personal suite</p>
  </div>
  <div id="fsHint">Tap anywhere for fullscreen</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var room = params.get('room') || 'RDC1-1';

    var stage = document.getElementById('stage');
    var eyebrowEl = document.getElementById('eyebrow');
    var nameEl = document.getElementById('name');
    var idleLogoEl = document.getElementById('idleLogo');
    var taglineEl = document.getElementById('tagline');
    var fsHint = document.getElementById('fsHint');

    var IDLE_EYEBROW = 'Welcome to';
    var IDLE_TAGLINE = 'Preparing your suite';

    function play(eyebrow, tagline, patientName) {
      stage.classList.remove('in');
      void stage.offsetWidth; // restart animation even if content is unchanged

      eyebrowEl.textContent = eyebrow;
      taglineEl.textContent = tagline;

      if (patientName) {
        nameEl.textContent = patientName;
        nameEl.style.display = '';
        idleLogoEl.style.display = 'none';
      } else {
        nameEl.style.display = 'none';
        idleLogoEl.style.display = '';
      }

      stage.classList.add('in');
    }

    function render(entry) {
      if (entry && entry.name) {
        play('Welcome', 'To your personal suite', entry.name);
      } else {
        play(IDLE_EYEBROW, IDLE_TAGLINE, null);
      }
    }

    var socket = io();
    socket.on('connect', function () { socket.emit('display:join', room); });
    socket.on('display:update', render);

    // ── Fullscreen handling ──────────────────────────────────────
    // Browsers block auto-fullscreen without a user gesture, so we
    // try immediately (works in some kiosk browsers), then fall back
    // to fullscreening on the first tap/click anywhere on screen.
    function enterFullscreen() {
      var el = document.documentElement;
      var request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (request) {
        request.call(el).then(function () {
          fsHint.classList.add('hidden');
        }).catch(function () { /* blocked until a real user gesture happens */ });
      }
    }

    document.addEventListener('click', function () {
      enterFullscreen();
    });
    document.addEventListener('fullscreenchange', function () {
      if (document.fullscreenElement) fsHint.classList.add('hidden');
    });
    window.addEventListener('load', enterFullscreen);
  </script>
</body>
</html>
