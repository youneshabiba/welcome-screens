<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome — Royal Dental Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!--
  Playfair Display = Latin name text (elegant italic serif)
  Amiri            = Arabic serif fallback — same "serif" family feeling
                      for Arabic patient names. Browsers auto-pick whichever
                      font in the stack actually has glyphs for each
                      character, so Latin names use Playfair and Arabic
                      names use Amiri automatically, no extra logic needed.
  Montserrat       = clean geometric sans for small labels, closest
                      widely-available match to the logo's wordmark style
-->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f3ead9;          /* primary text — warm beige/cream */
    --ink-soft: #e2c9ae;     /* secondary text — muted beige */
    --accent: #2b2622;       /* charcoal/black — rule, tagline accents */
    --font-display: "Playfair Display", "Amiri", Georgia, serif;
    --font-label: "Montserrat", "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: var(--font-label);
    color: var(--ink);
    background-image: url('/bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /*
    The background image already carries the ROYAL wordmark (roughly the
    middle band of the screen) and the large "R" watermark, so the welcome
    text sits in the clear space below it rather than on top of it.
  */
  .stage {
    position: relative;
    text-align: center;
    padding: 0 6vw 8vh;
    width: 100%;
  }

  .eyebrow {
    font-family: var(--font-label);
    font-size: clamp(13px, 1.4vw, 18px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 22px;
    opacity: 0;
  }

  .name {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(44px, 6.4vw, 92px);
    line-height: 1.1;
    margin: 0;
    letter-spacing: 0.01em;
    opacity: 0;
    color: var(--ink);
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 28px auto;
    opacity: 0;
    transform: scaleX(0);
  }

  .tagline {
    font-family: var(--font-label);
    font-size: clamp(13px, 1.3vw, 17px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0;
    opacity: 0;
  }

  /* entrance choreography */
  .stage.in .eyebrow { animation: rise 0.9s ease forwards 0.1s; }
  .stage.in .name { animation: rise 0.9s ease forwards 0.35s; }
  .stage.in .rule { animation: rule-in 0.7s ease forwards 0.9s; }
  .stage.in .tagline { animation: rise 0.9s ease forwards 1.1s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rule-in {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }

  /* tap-to-fullscreen hint, only shown until the screen goes fullscreen */
  #fsHint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.5;
    transition: opacity 0.4s ease;
  }
  #fsHint.hidden { opacity: 0; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    .stage.in .eyebrow, .stage.in .name, .stage.in .rule, .stage.in .tagline {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <p class="eyebrow" id="eyebrow">Welcome</p>
    <h1 class="name" id="name">—</h1>
    <div class="rule"></div>
    <p class="tagline" id="tagline">To your personal suite</p>
  </div>
  <div id="fsHint">Tap anywhere for fullscreen</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var room = params.get('room') || 'RDC1-1';

    var stage = document.getElementById('stage');
    var eyebrowEl = document.getElementById('eyebrow');
    var nameEl = document.getElementById('name');
    var taglineEl = document.getElementById('tagline');
    var fsHint = document.getElementById('fsHint');

    var IDLE_EYEBROW = 'Welcome to';
    var IDLE_NAME = 'Royal Dental Care';
    var IDLE_TAGLINE = "We're getting your suite ready";

    function play(eyebrow, name, tagline) {
      stage.classList.remove('in');
      void stage.offsetWidth; // restart animation even if content is unchanged
      eyebrowEl.textContent = eyebrow;
      nameEl.textContent = name;
      taglineEl.textContent = tagline;
      stage.classList.add('in');
    }

    function render(entry) {
      if (entry && entry.name) {
        play('Welcome', entry.name, 'To your personal suite');
      } else {
        play(IDLE_EYEBROW, IDLE_NAME, IDLE_TAGLINE);
      }
    }

    var socket = io();
    socket.on('connect', function () { socket.emit('display:join', room); });
    socket.on('display:update', render);

    // ── Fullscreen handling ──────────────────────────────────────
    // Browsers block auto-fullscreen without a user gesture, so we
    // try immediately (works in some kiosk browsers), then fall back
    // to fullscreening on the first tap/click anywhere on screen.
    function enterFullscreen() {
      var el = document.documentElement;
      var request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (request) {
        request.call(el).then(function () {
          fsHint.classList.add('hidden');
        }).catch(function () { /* blocked until a real user gesture happens */ });
      }
    }

    document.addEventListener('click', function () {
      enterFullscreen();
    });
    document.addEventListener('fullscreenchange', function () {
      if (document.fullscreenElement) fsHint.classList.add('hidden');
    });
    window.addEventListener('load', enterFullscreen);
  </script>
</body>
</html>
