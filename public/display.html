<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome</title>
<style>
  /* ───────────────────────────────────────────────────────────
     BRANDING — edit these to match your practice.
     ─────────────────────────────────────────────────────────── */
  :root {
    --bg-1: #101913;         /* background gradient, top */
    --bg-2: #0a0f0c;         /* background gradient, bottom */
    --ink: #f3efe6;          /* primary text (ivory) */
    --ink-soft: #b9c4bb;     /* secondary text (muted sage) */
    --accent: #c9a668;       /* hairline + monogram (soft gold) */
    --font-display: "Playfair Display", "Iowan Old Style", Georgia, serif;
    --font-label: "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(120% 90% at 50% 30%, var(--bg-1), var(--bg-2));
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-label);
    color: var(--ink);
  }

  /* ambient breathing glow behind the composition */
  .glow {
    position: absolute;
    width: 60vw;
    height: 60vw;
    max-width: 900px;
    max-height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,166,104,0.10) 0%, rgba(201,166,104,0) 70%);
    animation: breathe 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.12); opacity: 1; }
  }

  .stage {
    position: relative;
    text-align: center;
    padding: 0 6vw;
  }

  .eyebrow {
    font-size: clamp(13px, 1.4vw, 18px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 28px;
    opacity: 0;
  }

  .name {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(48px, 8vw, 118px);
    line-height: 1.05;
    margin: 0;
    letter-spacing: 0.02em;
    opacity: 0;
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 34px auto;
    opacity: 0;
    transform: scaleX(0);
  }

  .tagline {
    font-size: clamp(13px, 1.3vw, 17px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0;
    opacity: 0;
  }

  .monogram {
    position: absolute;
    right: 4vw;
    bottom: 4vh;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--accent);
    opacity: 0.75;
  }

  /* entrance choreography */
  .stage.in .eyebrow { animation: rise 0.9s ease forwards 0.1s; }
  .stage.in .name { animation: rise 0.9s ease forwards 0.35s; }
  .stage.in .rule { animation: rule-in 0.7s ease forwards 0.9s; }
  .stage.in .tagline { animation: rise 0.9s ease forwards 1.1s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); letter-spacing: inherit; }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rule-in {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .glow, .stage.in .eyebrow, .stage.in .name, .stage.in .rule, .stage.in .tagline {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="stage" id="stage">
    <p class="eyebrow" id="eyebrow">Welcome</p>
    <h1 class="name" id="name">—</h1>
    <div class="rule"></div>
    <p class="tagline" id="tagline">To your personal suite</p>
  </div>
  <div class="monogram">DB</div><!-- swap for your clinic's initials/logo -->

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get('room') || '1';

    const stage = document.getElementById('stage');
    const eyebrowEl = document.getElementById('eyebrow');
    const nameEl = document.getElementById('name');
    const taglineEl = document.getElementById('tagline');

    const IDLE_EYEBROW = 'Welcome to';
    const IDLE_NAME = 'Dentolize Dental';   // swap for your practice name
    const IDLE_TAGLINE = "We're getting your suite ready";

    function play(eyebrow, name, tagline) {
      stage.classList.remove('in');
      // force reflow so the animation restarts even if content is unchanged
      void stage.offsetWidth;
      eyebrowEl.textContent = eyebrow;
      nameEl.textContent = name;
      taglineEl.textContent = tagline;
      stage.classList.add('in');
    }

    function render(entry) {
      if (entry && entry.name) {
        play('Welcome', entry.name, 'To your personal suite');
      } else {
        play(IDLE_EYEBROW, IDLE_NAME, IDLE_TAGLINE);
      }
    }

    const socket = io();
    socket.on('connect', () => socket.emit('display:join', room));
    socket.on('display:update', render);
    socket.on('disconnect', () => { /* keep last-shown name on screen */ });
  </script>
</body>
</html>
