<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Royal Dental Care — Room Displays</title>
<style>
  :root {
    --ink: #1b1f23;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #a24a1f;
    --accent-soft: #f7ece3;
    --bg: #faf8f5;
    --danger: #b3402f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 28px;
  }
  .branch-links {
    font-size: 13px;
    margin: -18px 0 24px;
  }
  .branch-links a {
    color: var(--accent);
    text-decoration: none;
    margin-right: 16px;
  }
  .branch-links a:hover { text-decoration: underline; }
  .rooms {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    max-width: 960px;
  }
  .room-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .room-card h2 {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .current {
    font-size: 15px;
    margin: 0 0 16px;
    min-height: 20px;
  }
  .current .name {
    font-weight: 600;
    color: var(--ink);
  }
  .current .empty {
    color: var(--muted);
    font-style: italic;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 10px;
  }
  input[type="text"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .btn-row { display: flex; gap: 8px; }
  button {
    font-size: 14px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-clear {
    background: #fff;
    border-color: var(--line);
    color: var(--danger);
  }
  .btn-clear:hover { background: #fbf1ef; }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: #cbd5c9;
  }
  .status-dot.on { background: #3f8a5c; }
  #conn {
    position: fixed;
    top: 20px;
    right: 24px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div id="conn"><span class="status-dot" id="dot"></span><span id="connText">Connecting…</span></div>
  <h1 id="heading">Royal Dental Care — Room Displays</h1>
  <p class="sub">Type a patient's name and press Show — it appears on that room's TV immediately.</p>
  <p class="branch-links" id="branchLinks"></p>

  <div class="rooms" id="rooms"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var socket = io();
    var roomsEl = document.getElementById('rooms');
    var dot = document.getElementById('dot');
    var connText = document.getElementById('connText');
    var heading = document.getElementById('heading');
    var branchLinksEl = document.getElementById('branchLinks');

    // ?branch=RDC1 shows only that branch's rooms. No param shows everything.
    var branchFilter = new URLSearchParams(location.search).get('branch');

    socket.on('connect', function () {
      dot.classList.add('on');
      connText.textContent = 'Connected';
      socket.emit('control:join');
    });
    socket.on('disconnect', function () {
      dot.classList.remove('on');
      connText.textContent = 'Reconnecting…';
    });

    function branchOf(id) { return id.split('-')[0]; }
    function roomLabelOf(id) {
      var parts = id.split('-');
      return 'Room ' + (parts[1] || parts[0]);
    }
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function render(allRoomIds, state) {
      var branches = [];
      allRoomIds.forEach(function (id) {
        var b = branchOf(id);
        if (branches.indexOf(b) === -1) branches.push(b);
      });

      // Links to jump between branch-specific control views
      if (branches.length > 1) {
        branchLinksEl.innerHTML = branches.map(function (b) {
          return '<a href="/control?branch=' + encodeURIComponent(b) + '">' + escapeHtml(b) + ' only</a>';
        }).join('') + '<a href="/control">All branches</a>';
      } else {
        branchLinksEl.innerHTML = '';
      }

      var visibleIds = branchFilter
        ? allRoomIds.filter(function (id) { return branchOf(id) === branchFilter; })
        : allRoomIds;

      heading.textContent = branchFilter
        ? 'Royal Dental Care — ' + branchFilter
        : 'Royal Dental Care — Room Displays';

      roomsEl.innerHTML = visibleIds.map(function (id) {
        var entry = state[id] || { name: '' };
        var currentHtml = entry.name
          ? 'Now showing: <span class="name">' + escapeHtml(entry.name) + '</span>'
          : '<span class="empty">No name set — showing idle screen</span>';
        var cardLabel = branches.length > 1 ? (branchOf(id) + ' — ' + roomLabelOf(id)) : roomLabelOf(id);
        return (
          '<div class="room-card">' +
            '<h2>' + escapeHtml(cardLabel) + '</h2>' +
            '<p class="current">' + currentHtml + '</p>' +
            '<input type="text" id="input-' + id + '" placeholder="Patient name" value="" />' +
            '<div class="btn-row">' +
              '<button class="btn-primary" onclick="showName(\'' + id + '\')">Show</button>' +
              '<button class="btn-clear" onclick="clearRoom(\'' + id + '\')">Clear</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      visibleIds.forEach(function (id) {
        var input = document.getElementById('input-' + id);
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') showName(id);
        });
      });
    }

    function showName(id) {
      var input = document.getElementById('input-' + id);
      var name = input.value.trim();
      if (!name) return;
      socket.emit('control:setName', { room: id, name: name });
      input.value = '';
    }

    function clearRoom(id) {
      socket.emit('control:clear', { room: id });
    }

    socket.on('control:state', function (payload) {
      render(payload.rooms, payload.state);
    });
  </script>
</body>
</html>
